name: Deploy Deadline Parser API
on:
   push:
     branches:
       - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download model files
        run: |
          chmod +x downloadModel.sh
          ./downloadModel.sh
          
      - name: Run compose up
        run: |
          docker compose up -d --wait
          docker compose logs --until 2m deadline-parser-api
