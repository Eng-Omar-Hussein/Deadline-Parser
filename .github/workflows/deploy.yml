name: Deploy Deadline Parser API
on:
  pull_request:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }} | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t deadline-parser-api:latest .
          docker tag deadline-parser-api:latest ${{ secrets.DOCKER_USERNAME }}/deadline-parser-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/deadline-parser-api:latest

      - name: Download model files
        run: |
          chmod +x downloadModel.sh
          ./downloadModel.sh
          
      - name: Run compose up
        run: |
          docker compose up -d --wait
          docker compose logs deadline-parser-api
